services:
  postgres:
    image: postgres:16
    container_name: learnex_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-learnex}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - learnex_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-learnex}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - learnex

  redis:
    image: redis:7
    container_name: learnex_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - learnex_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - learnex

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
      target: production
    container_name: learnex_api
    restart: unless-stopped
    env_file:
      - ../../apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - learnex_uploads:/app/uploads
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --proxy-headers"
    networks:
      - learnex

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
      target: production
    container_name: learnex_worker
    restart: unless-stopped
    env_file:
      - ../../apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - learnex

  nginx:
    image: nginx:stable
    container_name: learnex_nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../docker/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ../docker/certs:/etc/nginx/certs:ro
      - learnex_uploads:/app/uploads:ro
    networks:
      - learnex

volumes:
  learnex_postgres_data:
  learnex_redis_data:
  learnex_uploads:

networks:
  learnex:
    driver: bridge
